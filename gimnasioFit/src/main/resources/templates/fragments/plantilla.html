<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:fragment="cabecera">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Gimnasio Fitness</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">
</head>

<body>

    <header th:fragment="encabezado"
            class="bg-dark text-white text-center py-4">

        <div class="container">
            <h1 class="fw-bold">Gimnasio Fitness</h1>
            <p class="mb-0">Entrena, mejora y alcanza tus objetivos</p>
        </div>

    </header>

    <nav th:fragment="navegacion"
         class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold" th:href="@{/}">
                Gym Fitness
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#menuPrincipal">

                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menuPrincipal">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">
                            Inicio
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/categorias}">
                            Categorías
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/servicios}">
                            Clases
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/reservas}">
                            Reservas
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/contacto}">
                            Contacto
                        </a>
                    </li>

                </ul>

            </div>
        </div>
    </nav>

    <footer th:fragment="pie"
            class="bg-dark text-white text-center py-3 mt-auto">

        <div class="container">
            <p class="mb-0">
                © 2026 Gimnasio Fitness
            </p>
        </div>

    </footer>

    <script th:fragment="scripts"
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

</body>
</html>

<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/plantilla :: cabecera}"></head>

<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments/plantilla :: encabezado}"></header>

    <nav th:replace="~{fragments/plantilla :: navegacion}"></nav>

    <main class="container py-5 flex-grow-1">

        <div class="row justify-content-center">

            <div class="col-md-8 col-lg-6">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h2 class="h4 mb-0"
                            th:text="${reserva.id == null
                            ? 'Agregar reserva'
                            : 'Editar reserva'}">
                        </h2>

                    </div>

                    <div class="card-body">

                        <form th:action="@{/reservas/guardar}"
                              th:object="${reserva}"
                              method="post">

                            <input type="hidden" th:field="*{id}">

                            <div class="mb-3">

                                <label for="nombreCliente"
                                       class="form-label">
                                    Nombre del cliente
                                </label>

                                <input type="text"
                                       id="nombreCliente"
                                       class="form-control"
                                       th:field="*{nombreCliente}"
                                       maxlength="100"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label for="fecha" class="form-label">
                                    Fecha
                                </label>

                                <input type="date"
                                       id="fecha"
                                       class="form-control"
                                       th:field="*{fecha}"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label for="servicio" class="form-label">
                                    Clase o servicio
                                </label>

                                <select id="servicio"
                                        class="form-select"
                                        th:field="*{servicio.id}"
                                        required>

                                    <option value="">
                                        Seleccione una clase
                                    </option>

                                    <option th:each="servicio : ${servicios}"
                                            th:value="${servicio.id}"
                                            th:text="${servicio.nombre}">
                                    </option>

                                </select>

                            </div>

                            <div class="d-flex justify-content-end gap-2">

                                <a class="btn btn-secondary"
                                   th:href="@{/reservas}">
                                    Cancelar
                                </a>

                                <button type="submit"
                                        class="btn btn-success">
                                    Guardar
                                </button>

                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/plantilla :: pie}"></footer>

    <script th:replace="~{fragments/plantilla :: scripts}"></script>

</body>
</html>

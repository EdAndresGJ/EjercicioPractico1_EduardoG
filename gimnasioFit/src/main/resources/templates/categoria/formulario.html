<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/plantilla :: cabecera}"></head>

<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments/plantilla :: encabezado}"></header>

    <nav th:replace="~{fragments/plantilla :: navegacion}"></nav>

    <main class="container py-5 flex-grow-1">

        <div class="row justify-content-center">

            <div class="col-md-7 col-lg-6">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h2 class="h4 mb-0"
                            th:text="${categoria.id == null
                            ? 'Agregar categoría'
                            : 'Editar categoría'}">
                        </h2>

                    </div>

                    <div class="card-body">

                        <form th:action="@{/categorias/guardar}"
                              th:object="${categoria}"
                              method="post">

                            <input type="hidden"
                                   th:field="*{id}">

                            <div class="mb-3">

                                <label for="nombre"
                                       class="form-label">
                                    Nombre de la categoría
                                </label>

                                <input type="text"
                                       id="nombre"
                                       class="form-control"
                                       th:field="*{nombre}"
                                       maxlength="100"
                                       required>

                            </div>

                            <div class="d-flex justify-content-end gap-2">

                                <a class="btn btn-secondary"
                                   th:href="@{/categorias}">
                                    Cancelar
                                </a>

                                <button type="submit"
                                        class="btn btn-success">
                                    Guardar
                                </button>

                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/plantilla :: pie}"></footer>

    <script th:replace="~{fragments/plantilla :: scripts}"></script>

</body>
</html>

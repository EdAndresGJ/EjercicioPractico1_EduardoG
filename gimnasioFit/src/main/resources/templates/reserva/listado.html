<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/plantilla :: cabecera}"></head>

<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments/plantilla :: encabezado}"></header>

    <nav th:replace="~{fragments/plantilla :: navegacion}"></nav>

    <main class="container py-5 flex-grow-1">

        <div class="d-flex justify-content-between align-items-center mb-4">

            <h2>Reservas de clases</h2>

            <a class="btn btn-primary"
               th:href="@{/reservas/nueva}">
                Agregar reserva
            </a>

        </div>

        <div class="alert alert-info"
             th:if="${#lists.isEmpty(reservas)}">
            No existen reservas registradas.
        </div>

        <div class="table-responsive"
             th:unless="${#lists.isEmpty(reservas)}">

            <table class="table table-striped table-bordered align-middle">

                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Cliente</th>
                        <th>Fecha</th>
                        <th>Clase</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="reserva : ${reservas}">

                        <td th:text="${reserva.id}"></td>

                        <td th:text="${reserva.nombreCliente}"></td>

                        <td th:text="${#temporals.format(reserva.fecha, 'dd/MM/yyyy')}"></td>

                        <td th:text="${reserva.servicio.nombre}"></td>

                        <td class="text-center">

                            <a class="btn btn-warning btn-sm"
                               th:href="@{/reservas/editar/{id}(id=${reserva.id})}">
                                Editar
                            </a>

                            <a class="btn btn-danger btn-sm"
                               th:href="@{/reservas/eliminar/{id}(id=${reserva.id})}">
                                Eliminar
                            </a>

                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

    </main>

    <footer th:replace="~{fragments/plantilla :: pie}"></footer>

    <script th:replace="~{fragments/plantilla :: scripts}"></script>

</body>
</html>

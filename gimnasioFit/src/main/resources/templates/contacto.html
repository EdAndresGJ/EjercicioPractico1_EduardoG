<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{fragments/plantilla :: cabecera}"></head>

<body class="d-flex flex-column min-vh-100">

    <header th:replace="~{fragments/plantilla :: encabezado}"></header>

    <nav th:replace="~{fragments/plantilla :: navegacion}"></nav>

    <main class="container py-5 flex-grow-1">

        <div class="row justify-content-center">

            <div class="col-md-8 col-lg-6">

                <div class="card shadow">

                    <div class="card-header bg-primary text-white">

                        <h2 class="h4 mb-0">
                            Quejas y sugerencias
                        </h2>

                    </div>

                    <div class="card-body">

                        <form>

                            <div class="mb-3">

                                <label for="nombre"
                                       class="form-label">
                                    Nombre
                                </label>

                                <input type="text"
                                       id="nombre"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label for="correo"
                                       class="form-label">
                                    Correo electrónico
                                </label>

                                <input type="email"
                                       id="correo"
                                       class="form-control"
                                       required>

                            </div>

                            <div class="mb-3">

                                <label for="mensaje"
                                       class="form-label">
                                    Mensaje
                                </label>

                                <textarea id="mensaje"
                                          class="form-control"
                                          rows="5"
                                          required></textarea>

                            </div>

                            <button type="button"
                                    class="btn btn-primary">
                                Enviar mensaje
                            </button>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </main>

    <footer th:replace="~{fragments/plantilla :: pie}"></footer>

    <script th:replace="~{fragments/plantilla :: scripts}"></script>

</body>
</html>
